<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSCE AI Simulator</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d2e; --surface2: #252840; --border: #2e3250;
    --text: #e8eaf0; --muted: #7b829e; --accent: #6c72ff; --accent2: #a78bfa;
    --green: #22c55e; --red: #ef4444; --yellow: #eab308;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  #app { max-width: 900px; margin: 0 auto; padding: 24px 16px 80px; }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  h1 span { background: linear-gradient(90deg, #6c72ff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .muted { color: var(--muted); font-size: 0.85rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
  .card:hover.clickable { border-color: var(--accent); cursor: pointer; }
  .card.clickable.selected { border-color: var(--accent); background: rgba(108,114,255,0.08); }
  .btn { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 10px 18px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
  .btn:hover { background: var(--accent2); }
  .btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn.secondary:hover { border-color: var(--accent); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .between { justify-content: space-between; }
  input[type=text], textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; color: var(--text); font-size: 0.9rem; }
  .step-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
  .step-pill { padding: 5px 12px; border-radius: 99px; font-size: 0.72rem; font-weight: 600; border: 1px solid var(--border); color: var(--muted); }
  .step-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .step-pill.done { background: rgba(34,197,94,0.15); color: var(--green); border-color: rgba(34,197,94,0.3); }
  .chat-log { display: flex; flex-direction: column; gap: 10px; max-height: 420px; overflow-y: auto; margin-bottom: 14px; padding-right: 4px; }
  .bubble { max-width: 78%; padding: 10px 14px; border-radius: 14px; font-size: 0.9rem; line-height: 1.4; }
  .bubble.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .bubble.patient { align-self: flex-start; background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .bubble.system { align-self: center; background: transparent; color: var(--muted); font-size: 0.78rem; font-style: italic; }
  .finding-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
  .finding-card.signifikan { border-color: var(--green); background: rgba(34,197,94,0.06); }
  .finding-card .nama { font-weight: 700; font-size: 0.85rem; margin-bottom: 4px; }
  .finding-card img { max-width: 100%; border-radius: 8px; margin-top: 8px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 7px 14px; font-size: 0.85rem; cursor: pointer; }
  .chip.selected { border-color: var(--accent); background: rgba(108,114,255,0.15); }
  .chip.correct { border-color: var(--green); background: rgba(34,197,94,0.15); }
  .chip.incorrect { border-color: var(--red); background: rgba(239,68,68,0.15); }
  .chip.rx { border-radius: 10px; white-space: pre-line; font-family: 'Consolas', 'Courier New', monospace; font-size: 0.8rem; line-height: 1.5; text-align: left; max-width: 320px; }
  #ddSearch { width: 100%; }
  #ddSelected .chip.selected { background: rgba(108,114,255,0.2); }
  #ddOptions .chip:hover { border-color: var(--accent); }
  .loading { color: var(--muted); font-size: 0.85rem; font-style: italic; }
  a.back { color: var(--muted); text-decoration: none; font-size: 0.85rem; }
  a.back:hover { color: var(--accent); }
</style>
</head>
<body>
  <div id="app"></div>
  <script src="app.js"></script>
</body>
</html>
